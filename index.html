<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cedarwings SAS Dashboard</title>
</head>
<body>

<h2>Cedarwings SAS - Test System</h2>

<button id="testInsertBtn">Test Insert</button>

<script type="module">
import { createClient } from 'https://esm.sh/@supabase/supabase-js@2'
import { SUPABASE_CONFIG } from './config.js'

const supabase = createClient(SUPABASE_CONFIG.url, SUPABASE_CONFIG.anonKey)

console.log('✅ Supabase connected')

// TEST INSERT BUTTON
document.getElementById('testInsertBtn').addEventListener('click', async () => {

  const { data, error } = await supabase
    .from('time_sessions')
    .insert([
      {
        employee_name: 'Test User',
        session_type: 'productive',
        work_type: '3D Printing',
        machine: 'RP601',
        order_no: 'ORD-TEST',
        batch_id: 'B-TEST',
        task_description: 'Testing insert',
        started_at: new Date().toISOString()
      }
    ])

  if (error) {
    alert('❌ Error: ' + error.message)
    console.log(error)
  } else {
    alert('✅ Inserted successfully!')
    console.log(data)
  }

})

</script>

</body>
</html>
